<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form{
    background:#1a1a1a;
    padding:30px;
    border-radius:10px;
    width:300px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    background:white;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="form">

<h1>Order</h1>

<input type="text" placeholder="الاسم">

<input type="text" placeholder="اللقب">

<input type="text" placeholder="رقم الهاتف">

<select>
<option>اختر المقاس</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button>Send Order</button>

</div>

</body>
</html>
